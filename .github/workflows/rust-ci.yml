name: rust-ci

on:
  workflow_dispatch:

# This fork relies on the Release workflow for post-push validation.
# Keep rust-ci available for manual runs, but suppress inherited auto-triggers.

jobs:
  noop:
    name: No-op CI (placeholder)
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "rust-ci placeholder job succeeded"

  results:
    name: CI results (required)
    needs: [noop]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          [[ "${{ needs.noop.result }}" == "success" ]] || exit 1
